<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VELVET PONG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<!-- Vercel Web Analytics -->
<script>window.va = window.va || function(){(window.vaq = window.vaq || []).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #7a6030;
    --bg: #080808;
    --glow-p1: #4cc9f0;
    --glow-p2: #f72585;
    --text: #e8dcc8;
    --text-dim: #6b6050;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    touch-action: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(76,201,240,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 50%, rgba(247,37,133,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  #wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    user-select: none;
    width: 100%;
    padding: 10px;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 700px;
    padding: 0 4px;
  }

  .player-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .player-label {
    font-size: clamp(8px, 2vw, 10px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .player-label.p1 { color: var(--glow-p1); }
  .player-label.p2 { color: var(--glow-p2); }

  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 12vw, 72px);
    line-height: 1;
    letter-spacing: 0.04em;
  }
  .score.p1 {
    color: var(--glow-p1);
    text-shadow: 0 0 30px rgba(76,201,240,0.6), 0 0 60px rgba(76,201,240,0.3);
  }
  .score.p2 {
    color: var(--glow-p2);
    text-shadow: 0 0 30px rgba(247,37,133,0.6), 0 0 60px rgba(247,37,133,0.3);
  }

  #title-block { text-align: center; }
  #title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(10px, 2.5vw, 13px);
    letter-spacing: 0.5em;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
  }
  #set-counter {
    font-size: clamp(7px, 1.8vw, 9px);
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── CANVAS WRAPPER ── */
  #canvas-wrap {
    position: relative;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.05),
      0 0 60px rgba(0,0,0,0.8),
      inset 0 0 80px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 700px;
    /* height set by JS */
  }

  #canvas-wrap::before, #canvas-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(201,168,76,0.2) 30%, rgba(201,168,76,0.2) 70%, transparent);
    z-index: 2;
    pointer-events: none;
  }
  #canvas-wrap::before { left: 0; }
  #canvas-wrap::after  { right: 0; }

  canvas { display: block; width: 100%; height: 100%; }

  /* ── OVERLAY ── */
  #overlay {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(8,8,8,0.88);
    backdrop-filter: blur(6px);
    z-index: 10;
    gap: 16px;
    transition: opacity 0.4s;
    padding: 20px;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 10vw, 52px);
    letter-spacing: 0.15em;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,168,76,0.7);
    text-align: center;
  }
  #overlay-sub {
    font-size: clamp(9px, 2.2vw, 11px);
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    line-height: 2;
  }
  #overlay-sub span {
    color: var(--text);
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px;
    margin: 0 2px;
    font-size: 9px;
  }

  #start-btn {
    margin-top: 6px;
    padding: 14px 48px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #start-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s;
    z-index: -1;
  }
  #start-btn:hover { color: var(--bg); }
  #start-btn:hover::before { transform: scaleX(1); }
  #start-btn:active { background: var(--gold); color: var(--bg); }

  /* ── SPEED BAR ── */
  #speed-bar-wrap {
    width: 100%;
    max-width: 700px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bar-label {
    font-size: 8px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    width: 45px;
    flex-shrink: 0;
  }
  #speed-track {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 1px;
    overflow: hidden;
  }
  #speed-fill {
    height: 100%;
    width: 20%;
    background: linear-gradient(90deg, var(--glow-p1), var(--gold), var(--glow-p2));
    border-radius: 1px;
    transition: width 0.3s;
  }

  /* ── FOOTER ── */
  #footer {
    display: flex;
    gap: 20px;
    font-size: 8px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    flex-wrap: wrap;
    justify-content: center;
  }
  #footer span { display: flex; align-items: center; gap: 5px; }
  .key {
    padding: 2px 6px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    color: var(--gold-dim);
    font-size: 8px;
  }

  /* ── TOUCH ZONE HINT ── */
  #touch-hint {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 50%;
    border-right: 1px dashed rgba(76,201,240,0.08);
    pointer-events: none;
    z-index: 1;
    display: none;
  }
  .is-touch #touch-hint { display: block; }
  #touch-hint-label {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 7px;
    letter-spacing: 0.2em;
    color: rgba(76,201,240,0.25);
    white-space: nowrap;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="wrapper">

  <div id="header">
    <div class="player-card">
      <div class="player-label p1">PLAYER</div>
      <div class="score p1" id="score-p1">0</div>
    </div>
    <div id="title-block">
      <div id="title">VELVET PONG</div>
      <div id="set-counter">FIRST TO 7</div>
    </div>
    <div class="player-card">
      <div class="player-label p2">CPU</div>
      <div class="score p2" id="score-p2">0</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="touch-hint"><div id="touch-hint-label">drag here</div></div>
    <div id="overlay">
      <div id="overlay-title">VELVET PONG</div>
      <div id="overlay-sub" id="overlay-sub-text">
        <span>W</span> / <span>S</span> to move &nbsp;·&nbsp; Mobile: drag left side<br>
        Beat the AI — first to 7 wins
      </div>
      <button id="start-btn">START MATCH</button>
    </div>
  </div>

  <div id="speed-bar-wrap">
    <div class="bar-label">SPEED</div>
    <div id="speed-track"><div id="speed-fill"></div></div>
  </div>

  <div id="footer">
    <span><span class="key">W</span><span class="key">S</span> Move</span>
    <span><span class="key">↑</span><span class="key">↓</span> Move</span>
    <span><span class="key">ESC</span> Pause</span>
  </div>

</div>

<script>
(() => {
  // ── RESPONSIVE CANVAS SIZE ──
  const GAME_W = 700, GAME_H = 420;
  const canvas = document.getElementById('c');
  const canvasWrap = document.getElementById('canvas-wrap');
  const ctx = canvas.getContext('2d');

  function resize() {
    const maxW = Math.min(window.innerWidth - 20, GAME_W);
    const scale = maxW / GAME_W;
    const h = GAME_H * scale;
    canvasWrap.style.height = h + 'px';
    canvas.width = GAME_W;
    canvas.height = GAME_H;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── TOUCH DETECTION ──
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouch) document.getElementById('canvas-wrap').classList.add('is-touch');

  // ── REFS ──
  const overlay    = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlaySub   = document.getElementById('overlay-sub-text');
  const startBtn   = document.getElementById('start-btn');
  const scoreP1El  = document.getElementById('score-p1');
  const scoreP2El  = document.getElementById('score-p2');
  const speedFill  = document.getElementById('speed-fill');

  // ── AUDIO ──
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audio = new AudioCtx();
  function beep(freq, dur, type = 'sine', vol = 0.18) {
    try {
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      osc.connect(gain); gain.connect(audio.destination);
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, audio.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + dur);
      osc.start(); osc.stop(audio.currentTime + dur);
    } catch(e) {}
  }
  function playHit(side) {
    beep(side === 'p1' ? 440 : 330, 0.08, 'square', 0.12);
    beep(side === 'p1' ? 880 : 660, 0.05, 'sine', 0.07);
  }
  function playWall()  { beep(220, 0.06, 'triangle', 0.1); }
  function playScore() { beep(110, 0.3, 'sawtooth', 0.1); beep(150, 0.2, 'sine', 0.08); }
  function playWin()   { [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f, 0.15, 'sine', 0.12), i*120)); }

  // ── CONSTANTS ──
  const PADDLE_W = 10, PADDLE_H = 80;
  const PAD_MARGIN = 20;
  const WIN_SCORE = 7;
  const MAX_SPEED = 12;
  const INIT_SPEED = 5;

  // AI — easier settings
  const AI_REACTION   = 0.065;   // was 0.12 — slower tracking
  const AI_MAX_SPEED  = 3.8;     // was 5.5 — can't keep up at high ball speeds
  const AI_WOBBLE     = 2.2;     // more random wobble = more mistakes
  const AI_DEAD_ZONE  = 18;      // won't react if ball is within this range (jitter)

  // ── STATE ──
  let state = 'menu';
  let scoreP1 = 0, scoreP2 = 0;
  let paddle1 = { x: PAD_MARGIN, y: GAME_H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H };
  let paddle2 = { x: GAME_W - PAD_MARGIN - PADDLE_W, y: GAME_H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H };
  let ball;
  let particles = [], trail = [], flashTimer = 0;

  // ── INPUT ──
  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Escape' && state === 'playing')  { state = 'paused'; showPause(); }
    else if (e.code === 'Escape' && state === 'paused') { state = 'playing'; overlay.classList.add('hidden'); }
    if (e.code === 'Space' && state === 'menu') startGame();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  // ── TOUCH CONTROLS ──
  // Player controls left half of canvas via drag
  let touchY = null;
  let lastTouchY = null;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (audio.state === 'suspended') audio.resume();
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleY = GAME_H / rect.height;
    // only left half
    const tx = (t.clientX - rect.left) * (GAME_W / rect.width);
    if (tx < GAME_W / 2) {
      touchY = (t.clientY - rect.top) * scaleY;
      lastTouchY = touchY;
    }
    if (state === 'menu' || state === 'gameover') startGame();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleY = GAME_H / rect.height;
    const tx = (t.clientX - rect.left) * (GAME_W / rect.width);
    if (tx < GAME_W / 2) {
      touchY = (t.clientY - rect.top) * scaleY;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    touchY = null;
  }, { passive: false });

  // ── BUTTONS ──
  startBtn.addEventListener('click', () => {
    if (audio.state === 'suspended') audio.resume();
    startGame();
  });

  // ── BALL ──
  function resetBall(towardsPlayer = null) {
    const speed = INIT_SPEED + Math.min((scoreP1 + scoreP2) * 0.2, MAX_SPEED - INIT_SPEED);
    let angle = (Math.random() * 0.6 - 0.3) + (Math.random() < 0.5 ? 0 : Math.PI);
    if (towardsPlayer === 1) angle = (Math.random() * 0.5 - 0.25);
    if (towardsPlayer === 2) angle = Math.PI + (Math.random() * 0.5 - 0.25);
    ball = { x: GAME_W/2, y: GAME_H/2, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, r: 7, speed };
    trail = [];
  }

  function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 4;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, decay: 0.04 + Math.random()*0.04, r: 1.5 + Math.random()*2.5, color });
    }
  }

  // ── SCREENS ──
  function showPause() {
    overlayTitle.textContent = 'PAUSED';
    overlaySub.innerHTML = 'Press <span>ESC</span> to resume · Tap to resume';
    startBtn.textContent = 'RESUME';
    overlay.classList.remove('hidden');
    startBtn.onclick = () => { state = 'playing'; overlay.classList.add('hidden'); };
  }

  function startGame() {
    scoreP1 = 0; scoreP2 = 0;
    scoreP1El.textContent = '0'; scoreP2El.textContent = '0';
    paddle1.y = GAME_H/2 - PADDLE_H/2;
    paddle2.y = GAME_H/2 - PADDLE_H/2;
    particles = []; trail = [];
    resetBall();
    state = 'playing';
    overlay.classList.add('hidden');
    startBtn.onclick = startGame;
  }

  function showGameOver(winner) {
    state = 'gameover';
    const win = winner === 1;
    overlayTitle.textContent = win ? 'VICTORY' : 'DEFEAT';
    overlaySub.innerHTML = win
      ? '✦ You dominated the table ✦'
      : 'The machine won<br>Try again?';
    startBtn.textContent = 'REMATCH';
    startBtn.onclick = startGame;
    overlay.classList.remove('hidden');
  }

  // ── UPDATE ──
  function update() {
    if (state !== 'playing') return;

    // Player — keyboard
    const PSPEED = 7;
    if (keys['KeyW'] || keys['ArrowUp'])   paddle1.y -= PSPEED;
    if (keys['KeyS'] || keys['ArrowDown']) paddle1.y += PSPEED;

    // Player — touch (move paddle centre to finger)
    if (touchY !== null) {
      const target = touchY - PADDLE_H / 2;
      const diff = target - paddle1.y;
      paddle1.y += diff * 0.3; // smooth follow
    }
    paddle1.y = Math.max(0, Math.min(GAME_H - PADDLE_H, paddle1.y));

    // AI — intentionally slower & wobblier
    const aiTarget = ball.y - PADDLE_H / 2;
    const aiDiff = aiTarget - paddle2.y;
    if (Math.abs(aiDiff) > AI_DEAD_ZONE) {
      const move = Math.sign(aiDiff) * Math.min(Math.abs(aiDiff) * AI_REACTION, AI_MAX_SPEED);
      paddle2.y += move + (Math.random() - 0.5) * AI_WOBBLE;
    }
    paddle2.y = Math.max(0, Math.min(GAME_H - PADDLE_H, paddle2.y));

    // Trail
    trail.push({ x: ball.x, y: ball.y, r: ball.r });
    if (trail.length > 18) trail.shift();

    // Ball movement
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall bounce
    if (ball.y - ball.r <= 0)       { ball.y = ball.r;       ball.vy *= -1; spawnParticles(ball.x, 0, '#fff'); playWall(); flashTimer = 4; }
    if (ball.y + ball.r >= GAME_H)  { ball.y = GAME_H-ball.r; ball.vy *= -1; spawnParticles(ball.x, GAME_H, '#fff'); playWall(); flashTimer = 4; }

    // P1 paddle hit
    if (ball.vx < 0 && ball.x - ball.r <= paddle1.x + paddle1.w && ball.x - ball.r >= paddle1.x - 4 &&
        ball.y >= paddle1.y - ball.r && ball.y <= paddle1.y + paddle1.h + ball.r) {
      ball.x = paddle1.x + paddle1.w + ball.r;
      const hp = (ball.y - paddle1.y) / paddle1.h - 0.5;
      const a = hp * (Math.PI / 3);
      ball.speed = Math.min(ball.speed + 0.3, MAX_SPEED);
      ball.vx = Math.cos(a) * ball.speed;
      ball.vy = Math.sin(a) * ball.speed;
      spawnParticles(ball.x, ball.y, '#4cc9f0', 16);
      playHit('p1'); flashTimer = 5;
    }

    // P2 paddle hit
    if (ball.vx > 0 && ball.x + ball.r >= paddle2.x && ball.x + ball.r <= paddle2.x + paddle2.w + 4 &&
        ball.y >= paddle2.y - ball.r && ball.y <= paddle2.y + paddle2.h + ball.r) {
      ball.x = paddle2.x - ball.r;
      const hp = (ball.y - paddle2.y) / paddle2.h - 0.5;
      const a = Math.PI - hp * (Math.PI / 3);
      ball.speed = Math.min(ball.speed + 0.3, MAX_SPEED);
      ball.vx = Math.cos(a) * ball.speed;
      ball.vy = Math.sin(a) * ball.speed;
      spawnParticles(ball.x, ball.y, '#f72585', 16);
      playHit('p2'); flashTimer = 5;
    }

    // Score
    if (ball.x < -20) {
      scoreP2++; scoreP2El.textContent = scoreP2; playScore();
      if (scoreP2 >= WIN_SCORE) { playWin(); setTimeout(() => showGameOver(2), 400); return; }
      resetBall(1);
    }
    if (ball.x > GAME_W + 20) {
      scoreP1++; scoreP1El.textContent = scoreP1; playScore();
      if (scoreP1 >= WIN_SCORE) { playWin(); setTimeout(() => showGameOver(1), 400); return; }
      resetBall(2);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05;
      p.life -= p.decay; p.vx *= 0.97; p.vy *= 0.97;
      if (p.life <= 0) particles.splice(i, 1);
    }

    const pct = ((ball.speed - INIT_SPEED) / (MAX_SPEED - INIT_SPEED)) * 100;
    speedFill.style.width = (20 + pct * 0.8) + '%';
    if (flashTimer > 0) flashTimer--;
  }

  // ── DRAW ──
  function draw() {
    const W = GAME_W, H = GAME_H;

    ctx.fillStyle = '#080808';
    ctx.fillRect(0, 0, W, H);

    if (flashTimer > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flashTimer * 0.018})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Centre line
    ctx.save();
    ctx.setLineDash([8, 14]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(201,168,76,0.12)';
    ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
    ctx.restore();

    // Trail
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const alpha = (i / trail.length) * 0.5;
      const r = t.r * (i / trail.length) * 0.9;
      if (r < 0.1) continue;
      ctx.save();
      ctx.globalAlpha = alpha;
      const g = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r * 2.5);
      g.addColorStop(0, '#ffe066'); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(t.x, t.y, r * 2.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Ball
    if (ball) {
      const gg = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r*5);
      gg.addColorStop(0, 'rgba(255,224,102,0.35)'); gg.addColorStop(1, 'transparent');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r*5, 0, Math.PI*2); ctx.fill();

      const bg = ctx.createRadialGradient(ball.x-ball.r*0.3, ball.y-ball.r*0.3, ball.r*0.1, ball.x, ball.y, ball.r);
      bg.addColorStop(0, '#fff9e0'); bg.addColorStop(0.5, '#ffe066'); bg.addColorStop(1, '#c9a84c');
      ctx.fillStyle = bg;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    }

    // Particles
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    drawPaddle(paddle1, '#4cc9f0', 'left');
    drawPaddle(paddle2, '#f72585', 'right');
  }

  function drawPaddle(p, color, side) {
    const W = GAME_W;
    const gx = p.x + p.w/2;
    const gg = ctx.createRadialGradient(gx, p.y+p.h/2, 0, gx, p.y+p.h/2, 50);
    gg.addColorStop(0, color+'40'); gg.addColorStop(1, 'transparent');
    ctx.fillStyle = gg;
    ctx.fillRect(p.x-30, p.y-20, p.w+60, p.h+40);

    ctx.save();
    ctx.shadowColor = color; ctx.shadowBlur = 18;
    rr(p.x, p.y, p.w, p.h, 4);
    const bg = ctx.createLinearGradient(p.x, p.y, p.x+p.w, p.y);
    if (side === 'left') { bg.addColorStop(0,'#8be8ff'); bg.addColorStop(1,'#4cc9f0'); }
    else                 { bg.addColorStop(0,'#f72585'); bg.addColorStop(1,'#ff7bb5'); }
    ctx.fillStyle = bg; ctx.fill();
    ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.4;
    rr(p.x+2, p.y+3, 2, p.h-6, 1);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.restore();
  }

  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  // ── LOOP ──
  function loop() { update(); draw(); requestAnimationFrame(loop); }
  resetBall();
  loop();
})();
</script>
