<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONG — Premium Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #7a6030;
    --bg: #080808;
    --surface: #0f0f0f;
    --glow-ball: #ffe066;
    --glow-p1: #4cc9f0;
    --glow-p2: #f72585;
    --text: #e8dcc8;
    --text-dim: #6b6050;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
    color: var(--text);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(76,201,240,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 50%, rgba(247,37,133,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  #wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    user-select: none;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 700px;
    padding: 0 4px;
  }

  .player-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .player-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .player-label.p1 { color: var(--glow-p1); }
  .player-label.p2 { color: var(--glow-p2); }

  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    letter-spacing: 0.04em;
  }

  .score.p1 {
    color: var(--glow-p1);
    text-shadow: 0 0 30px rgba(76,201,240,0.6), 0 0 60px rgba(76,201,240,0.3);
  }

  .score.p2 {
    color: var(--glow-p2);
    text-shadow: 0 0 30px rgba(247,37,133,0.6), 0 0 60px rgba(247,37,133,0.3);
  }

  #title-block {
    text-align: center;
  }

  #title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
  }

  #set-counter {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── CANVAS WRAPPER ── */
  #canvas-wrap {
    position: relative;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.05),
      0 0 60px rgba(0,0,0,0.8),
      inset 0 0 80px rgba(0,0,0,0.5);
  }

  #canvas-wrap::before, #canvas-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(201,168,76,0.2) 30%, rgba(201,168,76,0.2) 70%, transparent);
    z-index: 2;
    pointer-events: none;
  }
  #canvas-wrap::before { left: 0; }
  #canvas-wrap::after  { right: 0; }

  canvas { display: block; }

  /* ── OVERLAY ── */
  #overlay {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(8,8,8,0.88);
    backdrop-filter: blur(6px);
    z-index: 10;
    gap: 20px;
    transition: opacity 0.4s;
  }

  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #overlay-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 0.15em;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,168,76,0.7);
  }

  #overlay-sub {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    line-height: 1.8;
  }

  #overlay-sub span {
    color: var(--text);
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px;
    margin: 0 2px;
    font-size: 9px;
  }

  #start-btn {
    margin-top: 10px;
    padding: 12px 48px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  #start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s;
    z-index: -1;
  }

  #start-btn:hover {
    color: var(--bg);
  }

  #start-btn:hover::before {
    transform: scaleX(1);
  }

  /* ── FOOTER ── */
  #footer {
    display: flex;
    gap: 32px;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  #footer span { display: flex; align-items: center; gap: 6px; }

  .key {
    padding: 2px 7px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    color: var(--gold-dim);
    font-size: 9px;
  }

  /* ── SPEED INDICATOR ── */
  #speed-bar-wrap {
    width: 700px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .bar-label {
    font-size: 8px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    width: 50px;
  }

  #speed-track {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 1px;
    overflow: hidden;
  }

  #speed-fill {
    height: 100%;
    width: 20%;
    background: linear-gradient(90deg, var(--glow-p1), var(--gold), var(--glow-p2));
    border-radius: 1px;
    transition: width 0.3s;
  }
</style>
</head>
<body>
<div id="wrapper">

  <!-- HEADER -->
  <div id="header">
    <div class="player-card">
      <div class="player-label p1">PLAYER</div>
      <div class="score p1" id="score-p1">0</div>
    </div>
    <div id="title-block">
      <div id="title">PONG</div>
      <div id="set-counter">FIRST TO 7</div>
    </div>
    <div class="player-card">
      <div class="player-label p2">CPU</div>
      <div class="score p2" id="score-p2">0</div>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="c" width="700" height="420"></canvas>
    <div id="overlay">
      <div id="overlay-title" id="ot">PONG</div>
      <div id="overlay-sub" id="os">
        <span>W</span> / <span>S</span> &nbsp;to move<br>
        Beat the AI to 7 points to win
      </div>
      <button id="start-btn">START MATCH</button>
    </div>
  </div>

  <!-- SPEED -->
  <div id="speed-bar-wrap">
    <div class="bar-label">SPEED</div>
    <div id="speed-track"><div id="speed-fill"></div></div>
  </div>

  <!-- FOOTER -->
  <div id="footer">
    <span><span class="key">W</span><span class="key">S</span> Move paddle</span>
    <span><span class="key">ESC</span> Pause</span>
  </div>

</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const overlay = document.getElementById('overlay');
  const overlayTitle = document.querySelector('#overlay [id="ot"]') || document.querySelector('#overlay-title');
  const overlaySub = document.querySelector('#overlay [id="os"]') || document.querySelector('#overlay-sub');
  const startBtn = document.getElementById('start-btn');
  const scoreP1El = document.getElementById('score-p1');
  const scoreP2El = document.getElementById('score-p2');
  const speedFill = document.getElementById('speed-fill');

  // ── AUDIO ──
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audio = new AudioCtx();

  function beep(freq, dur, type = 'sine', vol = 0.18) {
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.connect(gain); gain.connect(audio.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audio.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + dur);
    osc.start(); osc.stop(audio.currentTime + dur);
  }

  function playHit(side) {
    beep(side === 'p1' ? 440 : 330, 0.08, 'square', 0.12);
    beep(side === 'p1' ? 880 : 660, 0.05, 'sine', 0.07);
  }

  function playWall() { beep(220, 0.06, 'triangle', 0.1); }
  function playScore() { beep(110, 0.3, 'sawtooth', 0.1); beep(150, 0.2, 'sine', 0.08); }
  function playWin()   { [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f, 0.15, 'sine', 0.12), i*120)); }

  // ── STATE ──
  const PADDLE_W = 10, PADDLE_H = 80;
  const PAD_MARGIN = 20;
  const WIN_SCORE = 7;
  const MAX_SPEED = 14;
  const INIT_SPEED = 5.5;

  let state = 'menu'; // menu | playing | paused | gameover
  let scoreP1 = 0, scoreP2 = 0;
  let raf;

  let paddle1 = { x: PAD_MARGIN, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, dy: 0 };
  let paddle2 = { x: W - PAD_MARGIN - PADDLE_W, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H };

  let ball;
  let particles = [];
  let trail = [];
  let flashTimer = 0;

  // AI config
  const AI_REACTION = 0.12; // 0–1, higher = harder
  const AI_MAX_SPEED = 5.5;

  function resetBall(towardsPlayer = null) {
    let speed = INIT_SPEED + Math.min((scoreP1 + scoreP2) * 0.25, MAX_SPEED - INIT_SPEED);
    let angle = (Math.random() * 0.7 - 0.35) + (Math.random() < 0.5 ? 0 : Math.PI);
    if (towardsPlayer === 1) angle = (Math.random() * 0.6 - 0.3);
    if (towardsPlayer === 2) angle = Math.PI + (Math.random() * 0.6 - 0.3);
    ball = {
      x: W / 2, y: H / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 7,
      speed: speed
    };
    trail = [];
  }

  function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.04 + Math.random() * 0.04,
        r: 1.5 + Math.random() * 2.5,
        color
      });
    }
  }

  // ── INPUT ──
  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Escape' && state === 'playing') { state = 'paused'; showPause(); }
    else if (e.code === 'Escape' && state === 'paused') { state = 'playing'; overlay.classList.add('hidden'); }
    if (e.code === 'Space' && state === 'menu') { startGame(); }
  });
  document.addEventListener('keyup', e => keys[e.code] = false);

  startBtn.addEventListener('click', () => {
    if (audio.state === 'suspended') audio.resume();
    startGame();
  });

  function showPause() {
    document.querySelector('#overlay-title').textContent = 'PAUSED';
    document.querySelector('#overlay-sub').innerHTML = 'Press <span>ESC</span> to resume';
    startBtn.textContent = 'RESUME';
    overlay.classList.remove('hidden');
    startBtn.onclick = () => { state = 'playing'; overlay.classList.add('hidden'); };
  }

  function startGame() {
    scoreP1 = 0; scoreP2 = 0;
    scoreP1El.textContent = '0'; scoreP2El.textContent = '0';
    paddle1.y = H/2 - PADDLE_H/2;
    paddle2.y = H/2 - PADDLE_H/2;
    particles = []; trail = [];
    resetBall();
    state = 'playing';
    overlay.classList.add('hidden');
  }

  function showGameOver(winner) {
    state = 'gameover';
    const isPlayer = winner === 1;
    document.querySelector('#overlay-title').textContent = isPlayer ? 'VICTORY' : 'DEFEAT';
    document.querySelector('#overlay-sub').innerHTML = isPlayer
      ? '✦ You dominated the table ✦'
      : 'The machine was superior<br>Challenge again?';
    startBtn.textContent = 'REMATCH';
    startBtn.onclick = startGame;
    overlay.classList.remove('hidden');
  }

  // ── UPDATE ──
  function update() {
    if (state !== 'playing') return;

    // Player paddle
    const PADDLE_SPEED = 7;
    if (keys['KeyW'] || keys['ArrowUp'])   paddle1.y -= PADDLE_SPEED;
    if (keys['KeyS'] || keys['ArrowDown']) paddle1.y += PADDLE_SPEED;
    paddle1.y = Math.max(0, Math.min(H - PADDLE_H, paddle1.y));

    // AI paddle
    const target = ball.y - PADDLE_H / 2;
    const diff = target - paddle2.y;
    const aiMove = Math.sign(diff) * Math.min(Math.abs(diff) * AI_REACTION * 1.1, AI_MAX_SPEED);
    paddle2.y += aiMove + (Math.random() - 0.5) * 0.8;
    paddle2.y = Math.max(0, Math.min(H - PADDLE_H, paddle2.y));

    // Trail
    trail.push({ x: ball.x, y: ball.y, r: ball.r });
    if (trail.length > 18) trail.shift();

    // Ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall bounce (top/bottom)
    if (ball.y - ball.r <= 0) {
      ball.y = ball.r; ball.vy *= -1;
      spawnParticles(ball.x, 0, '#fff');
      playWall();
      flashTimer = 4;
    }
    if (ball.y + ball.r >= H) {
      ball.y = H - ball.r; ball.vy *= -1;
      spawnParticles(ball.x, H, '#fff');
      playWall();
      flashTimer = 4;
    }

    // Paddle collision P1
    if (
      ball.x - ball.r <= paddle1.x + paddle1.w &&
      ball.x - ball.r >= paddle1.x &&
      ball.y >= paddle1.y - ball.r &&
      ball.y <= paddle1.y + paddle1.h + ball.r &&
      ball.vx < 0
    ) {
      ball.x = paddle1.x + paddle1.w + ball.r;
      const hitPos = (ball.y - paddle1.y) / paddle1.h - 0.5; // -0.5 to 0.5
      const maxBounceAngle = Math.PI / 3;
      const angle = hitPos * maxBounceAngle;
      ball.speed = Math.min(ball.speed + 0.35, MAX_SPEED);
      ball.vx = Math.cos(angle) * ball.speed;
      ball.vy = Math.sin(angle) * ball.speed;
      spawnParticles(ball.x, ball.y, '#4cc9f0', 16);
      playHit('p1');
      flashTimer = 5;
    }

    // Paddle collision P2
    if (
      ball.x + ball.r >= paddle2.x &&
      ball.x + ball.r <= paddle2.x + paddle2.w &&
      ball.y >= paddle2.y - ball.r &&
      ball.y <= paddle2.y + paddle2.h + ball.r &&
      ball.vx > 0
    ) {
      ball.x = paddle2.x - ball.r;
      const hitPos = (ball.y - paddle2.y) / paddle2.h - 0.5;
      const maxBounceAngle = Math.PI / 3;
      const angle = Math.PI - hitPos * maxBounceAngle;
      ball.speed = Math.min(ball.speed + 0.35, MAX_SPEED);
      ball.vx = Math.cos(angle) * ball.speed;
      ball.vy = Math.sin(angle) * ball.speed;
      spawnParticles(ball.x, ball.y, '#f72585', 16);
      playHit('p2');
      flashTimer = 5;
    }

    // Scoring
    if (ball.x < -20) {
      scoreP2++;
      scoreP2El.textContent = scoreP2;
      playScore();
      if (scoreP2 >= WIN_SCORE) { playWin(); setTimeout(() => showGameOver(2), 400); return; }
      resetBall(1);
    }
    if (ball.x > W + 20) {
      scoreP1++;
      scoreP1El.textContent = scoreP1;
      playScore();
      if (scoreP1 >= WIN_SCORE) { playWin(); setTimeout(() => showGameOver(1), 400); return; }
      resetBall(2);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.05;
      p.life -= p.decay;
      p.vx *= 0.97; p.vy *= 0.97;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Speed bar
    const pct = ((ball.speed - INIT_SPEED) / (MAX_SPEED - INIT_SPEED)) * 100;
    speedFill.style.width = (20 + pct * 0.8) + '%';

    if (flashTimer > 0) flashTimer--;
  }

  // ── DRAW ──
  function draw() {
    // Clear
    ctx.fillStyle = '#080808';
    ctx.fillRect(0, 0, W, H);

    if (flashTimer > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flashTimer * 0.018})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Center dashes
    ctx.save();
    ctx.setLineDash([8, 14]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(201,168,76,0.12)';
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.restore();

    // Ball trail
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const alpha = (i / trail.length) * 0.5;
      const r = t.r * (i / trail.length) * 0.9;
      ctx.save();
      ctx.globalAlpha = alpha;
      const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r * 2.5);
      grad.addColorStop(0, '#ffe066');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(t.x, t.y, r * 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Ball
    if (ball) {
      // Outer glow
      const glowGrad = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r * 5);
      glowGrad.addColorStop(0, 'rgba(255,224,102,0.35)');
      glowGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r * 5, 0, Math.PI * 2);
      ctx.fill();

      // Ball body
      const ballGrad = ctx.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, ball.r * 0.1, ball.x, ball.y, ball.r);
      ballGrad.addColorStop(0, '#fff9e0');
      ballGrad.addColorStop(0.5, '#ffe066');
      ballGrad.addColorStop(1, '#c9a84c');
      ctx.fillStyle = ballGrad;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Particles
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Paddle P1
    drawPaddle(paddle1, '#4cc9f0', 'left');
    // Paddle P2
    drawPaddle(paddle2, '#f72585', 'right');
  }

  function drawPaddle(p, color, side) {
    const rx = 4;

    // Glow
    const gx = side === 'left' ? p.x + p.w / 2 : p.x + p.w / 2;
    const glowGrad = ctx.createRadialGradient(gx, p.y + p.h / 2, 0, gx, p.y + p.h / 2, 50);
    glowGrad.addColorStop(0, color + '40');
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(p.x - 30, p.y - 20, p.w + 60, p.h + 40);

    // Body
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 18;
    roundRect(ctx, p.x, p.y, p.w, p.h, rx);
    const bodyGrad = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y);
    if (side === 'left') {
      bodyGrad.addColorStop(0, '#8be8ff');
      bodyGrad.addColorStop(1, '#4cc9f0');
    } else {
      bodyGrad.addColorStop(0, '#f72585');
      bodyGrad.addColorStop(1, '#ff7bb5');
    }
    ctx.fillStyle = bodyGrad;
    ctx.fill();
    ctx.restore();

    // Highlight
    ctx.save();
    ctx.globalAlpha = 0.4;
    roundRect(ctx, p.x + 2, p.y + 3, 2, p.h - 6, 1);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── LOOP ──
  function loop() {
    update();
    draw();
    raf = requestAnimationFrame(loop);
  }

  // Init
  resetBall();
  loop();
})();
</script>
</body>
</html>
